services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PROJECT_ROOT: /app
      REGISTRY_DIR: /app/registry
      CORPUS_PATH: /app/training_corpus.jsonl
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
